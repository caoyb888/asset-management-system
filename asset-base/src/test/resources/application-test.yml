# ============================================================
# 集成测试专用配置
# 禁用 Nacos 注册/配置中心，使用本地 MySQL，跳过 Redis 自动配置
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

  # 使用 HikariCP 连接真实 MySQL（不依赖 Druid 配置）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/asset_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000

  # Redis 保留配置（懒连接，测试流程不实际使用）
  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  # 仅排除自定义 JWT 安全配置（保留 Spring Security 使 HttpSecurity Bean 正常创建）
  # 测试中 @AutoConfigureMockMvc(addFilters=false) 已绕过所有过滤器
  autoconfigure:
    exclude:
      - com.asset.common.security.config.SecurityAutoConfiguration

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# XXL-Job 测试占位配置（避免占位符解析失败，执行器不会真正注册）
xxl:
  job:
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    accessToken: ""
    executor:
      appname: asset-base-test
      address: ""
      ip: ""
      port: -1
      logpath: /tmp/xxl-job-test
      logretentiondays: 1

logging:
  level:
    com.asset: debug
    org.springframework.test: info
