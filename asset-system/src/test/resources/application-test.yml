# ============================================================
# asset-system 集成测试配置
# 禁用 Nacos，使用本地 MySQL + Redis(db=15 隔离)
# SecurityAutoConfiguration 保留，使安全过滤器正常运行
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

  flyway:
    enabled: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/asset_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 15   # 独立 DB，避免污染开发环境

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

xxl:
  job:
    admin:
      addresses: http://127.0.0.1:8080/xxl-job-admin
    accessToken: ""
    executor:
      appname: asset-system-test
      address: ""
      ip: ""
      port: -1
      logpath: /tmp/xxl-job/jobhandler
      logretentiondays: 1
