spring:
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/asset_report?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER:root}
    password: ${MYSQL_PASS:root123}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: 0

  mail:
    host: ${MAIL_HOST:smtp.example.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USER:report@example.com}
    password: ${MAIL_PASS:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          timeout: 10000
          connection-timeout: 10000

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# XXL-Job 配置（报表执行器）
xxl:
  job:
    admin:
      addresses: http://${XXL_JOB_HOST:localhost}:${XXL_JOB_PORT:8180}/xxl-job-admin
    accessToken: ${XXL_JOB_TOKEN:default_token}
    executor:
      appname: asset-report-job
      address:
      ip:
      port: 9205
      logpath: /data/applogs/xxl-job/asset-report
      logretentiondays: 30

# 报表推送配置
report:
  schedule:
    mail-from: ${MAIL_USER:report@example.com}
    mail-from-name: 资产管理系统-报表中心
    # 最大重试次数
    max-retry: 3
    # 连续失败 N 次后自动禁用任务
    disable-threshold: 3

logging:
  level:
    com.asset: debug
