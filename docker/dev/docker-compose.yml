# ===========================================================
# 资产管理系统 - 开发环境 (Docker Compose + Traefik)
# 吸收实践: 一键拉起全套基础设施, 新人10分钟启动
# 用法: docker compose up -d
# ===========================================================
name: asset-dev

services:
  # --- Traefik 反向代理 (吸收实践) ---
  traefik:
    image: traefik:v3.1
    container_name: asset-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [asset-net]

  # --- MySQL 8.0 ---
  mysql:
    image: mysql:8.0
    container_name: asset-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PWD:-asset2026}
      MYSQL_USER: asset
      MYSQL_PASSWORD: ${DB_PWD:-asset2026}
      TZ: Asia/Shanghai
    ports: ["3306:3306"]
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-sql:/docker-entrypoint-initdb.d
      - ./mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
             --default-time-zone=+08:00 --lower-case-table-names=1
    healthcheck:
      test: mysqladmin ping -h localhost
      interval: 10s
      retries: 5
    networks: [asset-net]

  # --- Redis 7 ---
  redis:
    image: redis:7-alpine
    container_name: asset-redis
    restart: unless-stopped
    ports: ["6379:6379"]
    command: redis-server --requirepass ${REDIS_PWD:-asset2026} --maxmemory 256mb
             --maxmemory-policy allkeys-lru --appendonly yes
    volumes: [redis-data:/data]
    networks: [asset-net]

  # --- Nacos 注册/配置中心 ---
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: asset-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: ${DB_ROOT_PWD:-asset2026}
      JVM_XMS: 256m
      JVM_XMX: 512m
    ports: ["8848:8848", "9848:9848"]
    depends_on:
      mysql: { condition: service_healthy }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.nacos.rule=Host(`nacos.localhost`)"
      - "traefik.http.services.nacos.loadbalancer.server.port=8848"
    networks: [asset-net]

  # --- MinIO 文件存储 ---
  minio:
    image: minio/minio:latest
    container_name: asset-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-asset-admin}
      MINIO_ROOT_PASSWORD: ${MINIO_PWD:-asset2026}
    ports: ["9000:9000", "9001:9001"]
    command: server /data --console-address ":9001"
    volumes: [minio-data:/data]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.minio.rule=Host(`minio.localhost`)"
      - "traefik.http.services.minio.loadbalancer.server.port=9001"
    networks: [asset-net]

  # --- RabbitMQ ---
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: asset-mq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: asset
      RABBITMQ_DEFAULT_PASS: ${MQ_PWD:-asset2026}
    ports: ["5672:5672", "15672:15672"]
    volumes: [mq-data:/var/lib/rabbitmq]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mq.rule=Host(`mq.localhost`)"
      - "traefik.http.services.mq.loadbalancer.server.port=15672"
    networks: [asset-net]

  # --- Elasticsearch ---
  elasticsearch:
    image: elasticsearch:8.15.0
    container_name: asset-es
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms256m -Xmx512m"
    ports: ["9200:9200"]
    volumes: [es-data:/usr/share/elasticsearch/data]
    networks: [asset-net]

  # --- XXL-Job 调度中心 ---
  xxl-job:
    image: xuxueli/xxl-job-admin:2.4.1
    container_name: asset-xxljob
    restart: unless-stopped
    environment:
      PARAMS: >-
        --spring.datasource.url=jdbc:mysql://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8
        --spring.datasource.username=root
        --spring.datasource.password=${DB_ROOT_PWD:-asset2026}
    ports: ["8180:8080"]
    depends_on:
      mysql: { condition: service_healthy }
    networks: [asset-net]

volumes:
  mysql-data:
  redis-data:
  minio-data:
  es-data:
  mq-data:

networks:
  asset-net:
    driver: bridge
