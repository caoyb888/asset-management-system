# ============================================================
# 工作流模块集成测试专用配置
# ============================================================

spring:
  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/asset_db?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      minimum-idle: 2
      maximum-pool-size: 5
      connection-timeout: 10000

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 0

  autoconfigure:
    exclude:
      - com.asset.common.security.config.SecurityAutoConfiguration

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# Flowable: 不自动建表，不启动异步执行器，加快测试启动速度
flowable:
  database-schema-update: false
  async-executor-activate: false
  history-level: none

logging:
  level:
    com.asset: debug
    org.flowable: warn
    org.springframework.test: info
