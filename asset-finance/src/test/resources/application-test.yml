spring:
  # 关闭 Nacos 注册与配置拉取
  cloud:
    nacos:
      discovery:
        enabled: false
        register-enabled: false
      config:
        enabled: false

  # H2 内存库（MySQL 兼容模式）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:testdb;MODE=MySQL;DATABASE_TO_UPPER=false;NON_KEYWORDS=KEY,VALUE;DB_CLOSE_DELAY=-1
    username: sa
    password:

  # 关闭 Nacos 配置导入（避免 bootstrap 阶段连接 Nacos）
  config:
    import-check:
      enabled: false

  # 关闭 Redis 自动配置（单元测试不需要缓存）
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

  # H2 schema 初始化
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

logging:
  level:
    com.asset: warn
    org.springframework: warn
