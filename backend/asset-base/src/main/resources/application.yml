server:
  port: 8001
  servlet:
    context-path: /

spring:
  application:
    name: asset-base
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # Nacos 注册/配置
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NS:}
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        namespace: ${NACOS_NS:}
        file-extension: yml
        shared-configs:
          - data-id: application-common.yml
            group: DEFAULT_GROUP
            refresh: true

  # 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/asset_db?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai
    username: ${DB_USER:asset}
    password: ${DB_PWD:asset2026}
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 50
      max-wait: 60000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PWD:asset2026}
      database: 0

  # Flyway 数据库版本管理
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# MyBatis-Plus
mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# SpringDoc (吸收实践: 自动API文档)
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
  info:
    title: 基础数据服务 API
    version: 1.0.0

# 日志
logging:
  level:
    com.asset: debug
    org.springframework.web: info
  file:
    name: logs/${spring.application.name}.log
